<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro</title>
    <link rel="stylesheet" href="cadastro.css">
</head>

<body>
    <div class="container">
        <form>
            <label for="nome">Nome</label>
            <input type="text" id="nome" name="nome" placeholder="Digite seu nome">

            <label for="email">Email</label>
            <input type="email" id="email" name="email" placeholder="Digite seu email">

            <label for="senha">Criar senha</label>
            <input type="password" id="senha" name="senha" placeholder="Digite sua senha">

            <label for="confirmar">Confirme senha</label>
            <input type="password" id="confirmar" name="confirmar" placeholder="Confirme sua senha">
            
        <button onclick="entrar()" type="button" id="MeuBotao">ENTRAR</button>
        </form>

    </div>
    <script src="entrar.js"></script>
</body>

</html>
