<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Adubagem escolhida</title>
    <link rel="stylesheet" href="cadastro.css">
</head>

<body>
    <div class="container">
        <form>
            <label for="adubagem-escolhida">Adubagem escolhida</label>
            <input type="text" id="adubagem-escolhida" name="adubagem-escolhida" placeholder="Digite a adubagem">

            <label for="cidade">Cidade</label>
            <input type="text" id="cidade" name="cidade" placeholder="Digite sua cidade">

            <label for="plantaçao">O que vai plantar</label>
            <input type="text" id="plantacao" name="plantacao" placeholder="Digite o que vai plantar">

            <label for="quantidade-terra">Quantidade de terra</label>
            <input type="text" id="quantidade-terra" name="quantidade-terra" placeholder="Digite quantidade de terra">

            <label for="agronomo">Agronomo</label>
            <input type="text" id="Agronomo" name="agronomo" placeholder="Digite seu agronomo">

            <button type="calcular">CALCULAR</button>
        </form>
    </div>
    <script src="principal.js"></script>
</body>

</html>
